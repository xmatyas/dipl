<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Upload</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.min.css">
    <link rel="stylesheet" type="text/css" href="/static/style.css">
    <link rel="stylesheet" type="text/css" href="static/loading-bar/loading-bar.css"/>
    <script type="text/javascript" src="static/loading-bar/loading-bar.js"></script>
</head>
<body>
</br>
<div class="header">
    <h1>File Upload Test</h1>
</div>
<hr>
<div class="main">
    <div class="form">
        <div id="drop_zone" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)"
        ondrop="handleDrop(event)" onclick="triggerFileInput()">
        <form action="/upload" method="post" enctype="multipart/form-data">
            <p>Drop in a .pdf!</p>
            <input type="file" name="file" id="fileInput" style="display: none;" onchange="this.form.submit()">
        </form>
    </div>
    <div class="ldBar" data-value="50" data-stroke="data:ldbar/res,gradient(0,2,#1f18a5,#1858a5)" data-stroke-trail-width="19"></div>
</div>
</div>
<div class="footer">
    <p style="font-size: small; text-align: center; margin-top: 2rem;">Created by <a href="https://github.com/xmatyas" target="_blank">xmatyas</a></p>
</div>
<script>
    function handleDragOver(event) {
        event.preventDefault();
        document.getElementById('drop_zone').classList.add('dragover');
    }
    
    function handleDragLeave(event) {
        event.preventDefault();
        document.getElementById('drop_zone').classList.remove('dragover');
    }
    
    function handleDrop(event) {
        event.preventDefault();
        document.getElementById('drop_zone').classList.remove('dragover');
        
        var fileInput = document.getElementById('fileInput');
        var files = event.dataTransfer.files;
        
        fileInput.files = files;
        document.forms[0].submit();
    }
    function triggerFileInput() {
        document.getElementById('fileInput').click();
    }
</script>
</body>
</html>
